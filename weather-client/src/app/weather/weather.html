<h1>Weather Forecast</h1>

<table border="1">
    <thead>
        <tr>
            <th>Date</th>
            <th>Temp C</th>
            <th>Summary</th>
        </tr>
    </thead>

    <tbody>
        <!-- @for (forecast of forecasts; track forecast.date) { -->
        @for (forecast of forecasts(); track forecast.date) {
        <tr>
            <td>{{forecast.date}}</td>
            <td>{{forecast.temperatureC}}</td>
            <td>{{forecast.summary}}</td>
        </tr>
        }
    </tbody>
</table>
